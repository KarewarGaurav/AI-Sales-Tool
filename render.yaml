# Render Blueprint — static Vite SPA
# https://render.com/docs/deploy-create-a-render-app

services:
  - type: web
    name: ai-sale-tool
    runtime: node
    buildCommand: npm install && npm run build
    startCommand: npm start
    envVars:
      - key: NODE_VERSION
        value: "22"
      # Set in Render dashboard (required at build time for Vite):
      # VITE_API_URL
      # VITE_API_WEBHOOK_PROD
      # Optional: VITE_PROXY_TARGET (if using /api proxy in preview)
